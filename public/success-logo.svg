<svg width="900" height="330" viewBox="0 0 900 330" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Success HR Solutions</title>
  <desc id="desc">Success HR Solutions logo with blue text, orange HR bar, and upward growth mark.</desc>
  <defs>
    <linearGradient id="blueText" x1="40" y1="70" x2="780" y2="230" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#053C78"/>
      <stop offset="0.48" stop-color="#62D5E8"/>
      <stop offset="1" stop-color="#0B5BA7"/>
    </linearGradient>
    <linearGradient id="orangeBar" x1="290" y1="218" x2="660" y2="278" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F8C04E"/>
      <stop offset="1" stop-color="#E9832B"/>
    </linearGradient>
    <linearGradient id="markBlue" x1="590" y1="34" x2="720" y2="154" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#74DDF1"/>
      <stop offset="1" stop-color="#064F9E"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#063D74" flood-opacity="0.22"/>
    </filter>
  </defs>

  <g filter="url(#softShadow)">
    <text x="34" y="198" font-family="Arial Black, Arial, sans-serif" font-size="148" font-weight="900" fill="url(#blueText)">SUCC</text>
    <text x="640" y="198" font-family="Arial Black, Arial, sans-serif" font-size="148" font-weight="900" fill="url(#blueText)">SS</text>
  </g>

  <g transform="translate(505 20)">
    <path d="M147 39C123 47 113 64 104 85C122 79 140 73 164 44C183 82 205 107 244 130C199 128 162 111 142 78C126 102 113 129 111 173C93 133 91 95 116 64C122 56 131 46 147 39Z" fill="url(#markBlue)"/>
    <circle cx="98" cy="65" r="15" fill="#0B83C4"/>
    <path d="M69 130C88 124 98 111 105 94C91 99 77 107 63 124C51 155 32 176 4 194C42 188 69 168 84 138C99 153 119 162 149 167C116 179 84 171 69 130Z" fill="#F4A321"/>
    <circle cx="62" cy="111" r="14" fill="#F6BE3D"/>
    <rect x="72" y="204" width="160" height="14" rx="3" fill="#2C86C8"/>
    <rect x="58" y="226" width="172" height="14" rx="3" fill="#E8832D"/>
    <rect x="47" y="248" width="184" height="14" rx="3" fill="#C4732C"/>
    <path d="M154 178C228 172 302 160 366 116" stroke="#0B65AC" stroke-width="8" stroke-linecap="round"/>
    <path d="M365 116L342 112L360 95L365 116Z" fill="#6ED8ED"/>
