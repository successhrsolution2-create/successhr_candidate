  <rect x="220" y="222" width="460" height="56" rx="4" fill="url(#orangeBar)"/>
  <text x="450" y="263" text-anchor="middle" font-family="Arial, sans-serif" font-size="38" font-weight="800" fill="#111827">HR Solution's</text>
  <text x="450" y="314" text-anchor="middle" font-family="Georgia, serif" font-size="34" font-weight="700" fill="#0A5B9C">Your Success is Our Mission.....!</text>
</svg>
